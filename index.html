<style>
:root{--pink:#E7569E;--black:#171717;--gray:#5f6368;--border:#dadce0;--bg:#f8f9fa;--white:#fff;--green:#1a6b4a;--red:#c5221f}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Montserrat,sans-serif;background:var(--bg);color:var(--black);font-size:12px;line-height:1.5}
.page{max-width:920px;margin:0 auto;padding:28px 32px 48px}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--pink)}
.brand{font-size:11px;font-weight:800;letter-spacing:-.04em;color:var(--pink);text-transform:uppercase}
h1{font-size:20px;font-weight:800;letter-spacing:-.04em;margin-top:2px}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:var(--white);color:var(--gray);cursor:pointer}
.filters button.active{background:var(--pink);border-color:var(--pink);color:#fff}
.cols{display:grid;grid-template-columns:1fr 100px 100px 100px;gap:0 8px;margin-bottom:6px;padding:0 14px}
.cols.hdr{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.cols.hdr span{text-align:center}
.cols.hdr span:first-child{text-align:left}
.block{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
.block-title{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--pink);padding:12px 14px 8px;border-bottom:1px solid #eee}
.metric{display:grid;grid-template-columns:1fr 100px 100px 100px;gap:0 8px;padding:7px 14px;border-bottom:1px solid #f0f0f0;align-items:center}
.metric:last-child{border-bottom:none}
.metric .lbl{font-weight:600;color:var(--black);font-size:11px}
.cols.hdr span.col-focus{font-weight:800;color:var(--black)}
.metric .val{font-weight:400}
.metric .val.col-focus{font-weight:700;background:#fce8f3;margin:-7px 0;padding:7px 0}
.cols.hdr span.col-focus{background:#fce8f3;border-radius:4px;padding:2px 0}
details.meta-details{border-top:1px solid #eee}
details.meta-details summary.block-title{cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px}
details.meta-details summary.block-title::-webkit-details-marker{display:none}
details.meta-details summary.block-title::before{content:'▸';font-size:10px;color:var(--gray);transition:transform .15s}
details.meta-details[open] summary.block-title::before{transform:rotate(90deg)}
.mix-row .lbl{font-size:10px;color:var(--gray)}
.metric .val{text-align:center;font-size:12px;font-variant-numeric:tabular-nums}
.metric .val.pos{color:var(--green)}
.metric .val.neg{color:var(--red)}
.subtitle{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px;border-top:1px solid #f0f0f0}
.top-item{padding:6px 14px;border-bottom:1px dashed #eee;font-size:10px;display:flex;justify-content:space-between;gap:10px}
.top-item:last-child{border-bottom:none}
.top-item span:last-child{color:var(--gray);white-space:nowrap;font-weight:600}
.na{color:#bbb;font-weight:500}
.seg-legend{display:flex;flex-wrap:wrap;gap:10px 14px;padding:8px 14px 4px;font-size:8px;font-weight:600;color:var(--gray)}
.seg-legend span{display:inline-flex;align-items:center;gap:4px}
.seg-legend i{display:inline-block;width:10px;height:10px;border-radius:2px}
.seg-stacks{display:grid;grid-template-columns:1fr 100px 100px 100px;gap:0 8px;padding:6px 14px 10px;align-items:end}
.seg-stacks .lbl{font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em}
.seg-stack{display:flex;flex-direction:column-reverse;height:64px;width:52px;margin:0 auto;border-radius:4px;overflow:hidden;border:1px solid #eee}
.seg-stack span{display:block;width:100%;min-height:1px}
.seg-tora{background:#171717}
.seg-activa{background:var(--pink)}
.seg-constante{background:#d8d8d8}
.seg-riesgo{background:#9a9a9a}
.seg-total{font-size:8px;font-weight:700;text-align:center;margin-top:3px;color:var(--gray)}
.seg-stack-wrap.col-focus .seg-stack{box-shadow:0 0 0 2px #f5c4e0}
.seg-panel{padding:0 0 4px}
.seg-panel+.seg-panel{border-top:1px solid #eee}
.seg-panel-hd{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;padding:12px 14px 6px}
.seg-panel-note{font-size:9px;color:var(--gray);line-height:1.5;padding:0 14px 8px}
.seg-pb-hdr{margin:0 0 2px;padding-top:4px}
.metric.seg-pb-hd .lbl{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.metric.seg-pb-hd .lbl em{font-weight:500;color:var(--gray);font-size:9px;font-style:normal}
.seg-dot{display:inline-block;width:8px;height:8px;border-radius:2px;flex-shrink:0}
.seg-dot-tora{background:#171717}
.seg-dot-activa{background:var(--pink)}
.seg-dot-constante{background:#d8d8d8}
.seg-dot-riesgo{background:#9a9a9a}
.metric.seg-pb-phase .lbl{font-size:10px;font-weight:600;color:var(--gray);padding-left:22px}
.metric.seg-pb-phase .seg-pb-act{grid-column:2/-1;text-align:left;font-size:9px;line-height:1.45;font-weight:500;color:var(--black);padding-right:8px}
.metric.sub .lbl{font-weight:500;color:var(--gray);font-size:10px;padding-left:12px}
.seg-footnote{font-size:8px;color:var(--gray);padding:8px 14px 12px;line-height:1.5;border-top:1px solid #f0f0f0}
.meta-comment{font-size:10px;line-height:1.55;color:var(--black);padding:10px 14px 12px;background:#fafafa;border-top:1px solid #eee;border-left:3px solid var(--pink)}
.meta-note{font-size:8px;color:var(--gray);padding:0 14px 10px;line-height:1.45}
@media print{body{background:#fff}.filters{display:none}.page{padding:16px}}
</style>

const KEYS=['jun26','may26','jun25'];
let fam='total';
function fmt(n,pct){if(n==null||n===undefined)return'<span class="na">—</span>';if(pct)return n+'%';return typeof n==='number'?n.toLocaleString('es-AR'):n;}
function fmtNet(n,k){if(n==null)return'<div class="val'+(k==='jun26'?' col-focus':'')+'"><span class="na">—</span></div>';const c=n<0?'neg':n>0?'pos':'';const cls=(k==='jun26'?'val col-focus ':'val ')+c;return'<div class="'+cls.trim()+'">'+(n>0?'+':'')+n.toLocaleString('es-AR')+'</div>';}
function valCell(k,v,pct){const cls=k==='jun26'?'val col-focus':'val';return'<div class="'+cls+'">'+fmt(v,pct)+'</div>';}
function vals(obj,key,pct){return KEYS.map(k=>valCell(k,obj?.[k]?.[key],pct)).join('');}
function row(lbl,obj,key,o={}){const{pct,net,sub}=o;const cls=sub?'metric sub':'metric';const v=net?KEYS.map(k=>fmtNet(obj?.[k]?.[key],k)).join(''):vals(obj,key,pct);return '<div class="'+cls+'"><div class="lbl">'+lbl+'</div>'+v+'</div>';}
function segRow(lbl,s,key,o={}){const{pct,sub}=o;const cls='metric'+(sub?' sub':'');const v=KEYS.map(k=>valCell(k,s[k]?.[key],pct)).join('');return '<div class="'+cls+'"><div class="lbl">'+lbl+'</div>'+v+'</div>';}
function segEnrich(raw){
  if(!raw)return null;
  const riesgo_con_vista=raw.riesgo_con_vista??Math.max(0,(raw.en_riesgo||0)-(raw.sin_vista_mes||0));
  const pct_habituated=raw.pct_habituated??(raw.starting_active?Math.round(1000*((raw.tora||0)+(raw.activa_comprometida||0)+(raw.constante||0))/raw.starting_active)/10:0);
  return {...raw,riesgo_con_vista,pct_habituated};
}
function segPick(e){return KEYS.reduce((o,k)=>{o[k]=segEnrich(e[k]?.segments);return o},{});}

];
function segPlaybookPhase(days,act){
  return '<div class="metric seg-pb-phase sub"><div class="lbl">'+days+'</div><div class="val seg-pb-act">'+act+'</div></div>';
}
function segPlaybookSegment(item,s){
  const counts=KEYS.map(k=>valCell(k,s[k]?.[item.key])).join('');
  return '<div class="metric seg-pb-hd"><div class="lbl"><i class="seg-dot seg-dot-'+item.cls+'"></i>'+item.label+' <em>'+item.rule+'</em></div>'+counts+'</div>'
    +item.phases.map(p=>segPlaybookPhase(p.days,p.act)).join('');
}
function segPlaybook(s){
  let group='';
  const rows=SEG_PLAYBOOK.map(item=>{
    let hd='';
    if(item.group&&item.group!==group){group=item.group;hd='<div class="subtitle">'+group+'</div>';}
    return hd+segPlaybookSegment(item,s);
  }).join('');
  const hdr='<div class="cols hdr seg-pb-hdr"><span>Segmento · ventana (días del ciclo)</span><span class="col-focus">Jun 26</span><span>Mayo 26</span><span>Junio 25</span></div>';
  return '<div class="seg-panel seg-panel-playbook"><div class="seg-panel-hd">Cuándo intervenir</div><p class="seg-panel-note">Días del <strong>ciclo de suscripción</strong> (día 1 = renovación o alta). Filas de usuarias = mismo criterio que arriba · filas de ventana = acción recomendada (igual para todos los meses).</p>'+hdr+rows+'</div>';
}
function section(title,rows){return '<div class="block"><div class="block-title">'+title+'</div>'+rows+'</div>';}
function contentMix(e){const pick=()=>KEYS.reduce((o,k)=>{o[k]=e[k]?.content_mix;return o},{});const m=pick();if(!KEYS.some(k=>m[k]))return'';return row('% Home',m,'home_pct',{pct:true})+row('% Gym',m,'gym_pct',{pct:true})+row('% Otras (Yoga, Pilates, etc.)',m,'other_pct',{pct:true});}
function tops(e){const labels={jun26:'Junio 26',may26:'Mayo 26',jun25:'Junio 25'};const inner=KEYS.map(k=>{const t=e[k]?.top_titles;if(!t?.length)return '';return '<div class="subtitle">Top · '+labels[k]+'</div>'+t.map(x=>'<div class="top-item"><span>'+x.title+'</span><span>'+x.views.toLocaleString('es-AR')+' vistas</span></div>').join('');}).join('');if(!inner)return '<div class="top-item"><span class="na">Sin top para este plan</span></div>';return '<details class="meta-details"><summary class="block-title">Top 5 por mes</summary>'+inner+'</details>';}
function segStackInner(s){
  if(!s)return'<div class="seg-stack"></div><div class="seg-total"><span class="na">—</span></div>';
  const total=s.starting_active||(s.tora+s.activa_comprometida+s.constante+s.en_riesgo)||1;
  const pct=n=>Math.max(0.5,Math.round(1000*n/total)/10);
  return'<div class="seg-stack">'
    +'<span class="seg-tora" style="height:'+pct(s.tora)+'%"></span>'
    +'<span class="seg-activa" style="height:'+pct(s.activa_comprometida)+'%"></span>'
    +'<span class="seg-constante" style="height:'+pct(s.constante)+'%"></span>'
    +'<span class="seg-riesgo" style="height:'+pct(s.en_riesgo)+'%"></span>'
    +'</div><div class="seg-total">'+total.toLocaleString('es-AR')+'</div>';
}
function engagementSegments(e){

    +KEYS.map(k=>'<div class="seg-stack-wrap'+(k==='jun26'?' col-focus':'')+'">'+segStackInner(s[k])+'</div>').join('')
    +'</div>';
  const legend='<div class="seg-legend">'
    +'<span><i class="seg-tora"></i>Tora (≥15)</span>'
    +'<span><i class="seg-activa"></i>Activa (8–14)</span>'
    +'<span><i class="seg-constante"></i>Constante (4–7)</span>'
    +'<span><i class="seg-riesgo"></i>En riesgo (&lt;4 o sin vista)</span>'
    +'</div>';
  const dataPanel='<div class="seg-panel"><div class="seg-panel-hd">Distribución · títulos distintos / mes</div>'
    +legend+stacks
    +segRow('Tora (≥15)',s,'tora')
    +segRow('Activa comprometida (8–14)',s,'activa_comprometida')
    +segRow('Constante (4–7)',s,'constante')
    +segRow('En riesgo (total)',s,'en_riesgo')
    +segRow('Sin vista (0 títulos)',s,'sin_vista_mes',{sub:true})
    +segRow('Con 1–3 títulos',s,'riesgo_con_vista',{sub:true})
    +segRow('% con hábito (≥4 títulos)',s,'pct_habituated',{pct:true})
    +segRow('% Tora',s,'pct_tora',{pct:true})
    +segRow('% en riesgo',s,'pct_riesgo',{pct:true})
    +'<div class="seg-footnote">Base = activas inicio mes · Segmento según títulos distintos vistos en el mes calendario (distinto de &gt;4/&gt;8/&gt;12 vistas totales arriba).</div></div>';
  return '<details class="meta-details" open><summary class="block-title">Fidelización por segmento</summary>'+dataPanel+segPlaybook(s)+'</details>';
}
function metaRows(ma){
  if(!ma)return '';
  const t=ma.totals;
  const note=ma.summary?.adjust_note||'';
  let detail='';
  for(const s of ma.strategies){
    const m=s.months;
    const has=KEYS.some(k=>m[k]?.gasto_usd>0);
    if(!has)continue;
    const isAware=s.key==='follow';
    detail+='<div class="subtitle">'+s.label+'</div>'+
      row('Gasto total del mes (USD)',m,'gasto_usd')+
      (isAware
        ?row('Gasto awareness (USD)',m,'gasto_awareness_usd')+row('Visitas perfil Instagram',m,'visitas_ig')
        :row('Gasto conversión (USD)',m,'gasto_conv_usd')+row('Compras atribuidas',m,'compras')+row('CPA (costo por suscripción · USD)',m,'cpa_usd'));
  }
  return section('4 · Meta Ads',
    row('Gasto total del mes (USD)',t,'gasto_usd')+
    row('Gasto conversión (USD)',t,'gasto_conv_usd')+
    row('Gasto awareness (USD)',t,'gasto_awareness_usd')+
    row('Compras atribuidas',t,'compras')+
    row('CPA (costo por suscripción · USD)',t,'cpa_usd')+
    row('Visitas perfil Instagram',t,'visitas_ig')+
    (note?'<div class="meta-note">'+note+'</div>':'')+
    (detail?'<details class="meta-details"><summary class="block-title">Deep dive por campaña</summary>'+detail+'<div class="meta-note">Por campaña: compras y CPA según pixel. En mayo–jun el total de arriba está ajustado vs ventas Uscreen.</div></details>':'')
  );
}

document.getElementById('famFilters').innerHTML=Object.entries(DATA.family_labels).map(([k,l])=>'<button data-f="'+k+'"'+(k==='total'?' class="active"':'')+'>'+l+'</button>').join('');
document.getElementById('famFilters').onclick=ev=>{const b=ev.target.closest('button');if(!b)return;fam=b.dataset.f;document.querySelectorAll('#famFilters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
render();
</script>
